<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Melka Noz Macadâmia: Agroindústria familiar dedicada ao cultivo e comercialização de macadâmias de alta qualidade e sustentáveis.">
    <title>Melka - Contato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=close" />
    <link rel="icon" type="image/svg+xml" href="img/logo-melka.svg">

    <script src="header.js"></script>
    <script src="footer.js"></script>
</head>
<body>
    <header-component></header-component>
    <section id="contato" class="container-contato">
        <div class="contato-card">
            <h1>Contato</h1>
            <p class="contato-sub">Consulte nossos produtos e disponibilidade!</p>
            <form class="forms-contato" onsubmit="enviarWhats(event)">
                <div class="input-group">
                    <div>
                        <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Seu nome" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" placeholder="Seu melhor email">
                    </div>
                </div>
                <label for="mensagem">Mensagem</label>
                <textarea name="mensagem" id="mensagem" placeholder="Qual produto você procura?" required></textarea>
                <button type="submit" id="btn-enviar" aria-label="Enviar mensagem no WhatsApp">
                    <img src="img/whatsapp-svg.svg" alt="" style="height: 20px;">
                    Falar no WhatsApp
                </button>
                 
            </form>
        </div>
    </section>

    <footer-component></footer-component>

    <script>
        function enviarWhats(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('btn-enviar');
            const dados = new FormData(form);
            const msg = `*Nova mensagem do site*%0A%0ANome: ${dados.get('nome')}%0AEmail: ${dados.get('email')}%0AMensagem: ${dados.get('mensagem')}`;

            btn.disabled = true;
            btn.textContent = 'Abrindo WhatsApp...';

            window.open(`https://wa.me/5514981531006?text=${msg}`, '_blank');

            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = '<img src="img/whatsapp-svg.svg" alt="" style="height: 20px;"> Falar no WhatsApp';
            }, 5000);
        }
    </script>
</body>
</html>
